# ============================================
# Render 一键部署配置（Blueprint）
# 推送后在 Render 点 New → Blueprint → 选仓库 → Apply
# ============================================

services:
  - type: web
    name: xiangsudilao
    runtime: docker
    repo: https://github.com/Twilight719/xiangsudilao
    branch: master
    region: singapore
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        value: xiangsudilao-prod-2024-secret-key-do-not-share
      - key: H2_CONSOLE
        value: "false"
      - key: DB_PATH
        value: /app/data/dungeon_db
