server.port=${PORT:8080}

# H2 Database (file mode, 本地存用户目录，Docker 存 /app/data)
spring.datasource.url=jdbc:h2:file:${DB_PATH:${user.home}/dungeon_data/dungeon_db}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (生产环境建议关闭)
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

# Logging
logging.file.name=${LOG_PATH:${user.home}/dungeon_data/backend.log}

# JWT 密钥 (生产环境务必设置环境变量)
jwt.secret=${JWT_SECRET:pixel-dungeon-secret-key-2024-do-not-use-in-production}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}
